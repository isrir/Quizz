<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Adaptive Quiz Engine | Multi-Source JSON | Answer Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Header & Brand */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 25px 20px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* JSON loader card */
        .json-panel {
            background: #1e293b;
            border-radius: 28px;
            padding: 20px 24px;
            margin-bottom: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }

        .panel-title {
            color: #cbd5e1;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
        }

        .json-list {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            align-items: center;
        }

        .json-badge {
            background: #0f172a;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            border: 1px solid #334155;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .json-badge.active {
            background: #3b82f6;
            color: white;
            border-color: #60a5fa;
            box-shadow: 0 0 8px #3b82f680;
        }

        .remove-json-btn {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: 8px;
            padding: 0 4px;
            border-radius: 20px;
        }
        .remove-json-btn:hover {
            color: #ef4444;
            background: #334155;
        }

        .add-json-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
            align-items: flex-start;
        }

        .json-textarea {
            flex: 2;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 12px 16px;
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            resize: vertical;
        }

        .btn-add {
            background: linear-gradient(95deg, #2dd4bf, #14b8a6);
            border: none;
            padding: 0 24px;
            border-radius: 40px;
            font-weight: bold;
            color: #0f172a;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-add:hover {
            transform: scale(1.02);
            background: #5eead4;
        }

        .topic-selector {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .topic-chip {
            background: #1e293b;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid #334155;
            color: #cbd5e6;
        }

        .topic-chip.selected {
            background: #8b5cf6;
            color: white;
            border-color: #a78bfa;
        }

        .quiz-stats {
            background: #0f172a;
            border-radius: 24px;
            padding: 12px 20px;
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            color: #94a3b8;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* Quiz core */
        .quiz-section {
            animation: fadeIn 0.4s ease;
        }

        .progress-card {
            background: #1e293b;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .progress-bar {
            background: #334155;
            border-radius: 20px;
            overflow: hidden;
            height: 28px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            width: 0%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .question-card {
            background: #0f172a;
            border-radius: 32px;
            padding: 28px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 500;
            color: #f1f5f9;
            margin-bottom: 28px;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }

        .option-item {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 14px 20px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-item:hover:not(.disabled-option) {
            background: #2d3a5e;
            border-color: #8b5cf6;
        }

        .option-item.selected {
            background: #2d3a5e;
            border-color: #8b5cf6;
            box-shadow: 0 0 6px #8b5cf6;
        }

        .option-item.verify-correct {
            background: #14532d;
            border-color: #22c55e;
        }

        .option-item.verify-incorrect {
            background: #7f1d1d;
            border-color: #ef4444;
        }

        .disabled-option {
            cursor: default;
            opacity: 0.9;
        }

        .option-letter {
            font-weight: bold;
            color: #a78bfa;
            min-width: 32px;
            font-size: 1.1rem;
        }

        .feedback-area {
            background: #111827;
            border-radius: 20px;
            padding: 16px;
            margin-top: 12px;
            border-left: 5px solid #8b5cf6;
            color: #d1d5db;
        }

        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 10px;
        }

        .nav-btn {
            padding: 12px 24px;
            border-radius: 40px;
            background: #334155;
            border: none;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-btn.primary {
            background: #3b82f6;
        }
        .nav-btn.success {
            background: #10b981;
        }
        .nav-btn.warning {
            background: #f59e0b;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .verification-badge {
            margin-top: 15px;
            text-align: center;
            font-size: 0.85rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(6px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-card {
            background: #1e293b;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            border-radius: 32px;
            overflow-y: auto;
            padding: 24px;
            border: 1px solid #475569;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @media (max-width: 700px) {
            .question-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 PD2 Exam Simulator</h1>
        <p>Multiple JSON banks | Filter by topic | Submit & Verify your answers</p>
    </div>

    <!-- JSON Management Panel -->
    <div class="json-panel">
        <div class="panel-title">🗂️ Question Sets (JSON Banks)</div>
        <div id="jsonBadgeList" class="json-list"></div>
        <div class="add-json-area">
            <textarea id="newJsonInput" rows="2" class="json-textarea" placeholder='Paste new JSON array: [{"text":"...","options":{"A":"..."},"answers":["A"],"topic":"..."}]'></textarea>
            <button id="addJsonBtn" class="btn-add">➕ Add New JSON Set</button>
        </div>
        <div class="topic-selector" id="topicFilterContainer">
            <span style="color:#94a3b8;">🎯 Filter by topic:</span>
            <span data-topic="all" class="topic-chip selected">All Topics</span>
        </div>
        <div class="quiz-stats">
            <span>📚 Total questions: <strong id="totalQty">0</strong></span>
            <span>✅ Answered: <strong id="answeredCount">0</strong></span>
            <span>⭐ Correct: <strong id="correctCount">0</strong></span>
        </div>
    </div>

    <!-- Quiz main area -->
    <div id="quizSection" class="quiz-section" style="display: none;">
        <div class="progress-card">
            <div class="progress-bar"><div class="progress-fill" id="progressFill">0%</div></div>
            <div style="display: flex; justify-content: space-between; margin-top: 12px;">
                <span id="questionIndexLabel">Question 1 / 0</span>
                <span id="verificationStatusLabel">⚡ Not verified</span>
            </div>
        </div>

        <div class="question-card">
            <div class="question-text" id="questionText"></div>
            <div class="options-container" id="optionsContainer"></div>
            <div id="feedbackPanel" class="feedback-area" style="display: none;"></div>
            <div class="verification-badge" id="postSubmitHint"></div>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn">◀ Previous</button>
            <button class="nav-btn primary" id="submitCheckBtn">✅ Submit & Verify</button>
            <button class="nav-btn success" id="nextBtn">Next ▶</button>
            <button class="nav-btn warning" id="resetAllBtn">⟳ Reset Quiz</button>
            <button class="nav-btn" id="showFinalResultsBtn">🏆 Show Results</button>
        </div>
    </div>
</div>

<div id="resultsModal" class="modal">
    <div class="modal-card">
        <h2 style="color:white; margin-bottom: 20px;">📊 Final Verdict</h2>
        <div id="modalResultsBody"></div>
        <button id="closeModalBtn" style="margin-top:20px; background:#475569; padding:10px 20px; border-radius:30px; border:none; color:white; cursor:pointer;">Close</button>
    </div>
</div>

<script>
    // ---------- DATA STRUCTURE: each JSON set stored separately ----------
    let jsonSets = []; // each element: { id, name, questions: [] }
    let nextSetId = 1;
    
    // Combined and filtered questions for display
    let masterQuestions = [];      // flattened all questions (with sourceId reference)
    let filteredQuestions = [];      // topic filtered
    let currentIndex = 0;
    let userSelections = {};         // key: filtered index -> array of selected letters 
    let verifiedStatus = {};         // key: filtered index -> boolean 
    let userCorrectness = {};        // key: filtered index -> boolean
    
    // Helper: add a new JSON set
    function addJsonSet(questionsArray, setName = null) {
        if (!Array.isArray(questionsArray) || questionsArray.length === 0) return false;
        // Validate each question
        for (let q of questionsArray) {
            if (!q.text || !q.options || !q.answers) {
                alert("Invalid question: each needs text, options (object), answers (array)");
                return false;
            }
            if (!q.topic) q.topic = "General";
        }
        const setId = nextSetId++;
        const setDisplayName = setName || `Set ${setId} (${questionsArray.length} q)`;
        jsonSets.push({
            id: setId,
            name: setDisplayName,
            questions: questionsArray
        });
        rebuildMasterList();
        updateJsonBadgeUI();
        refreshAllFromMaster();
        return true;
    }
    
    function removeJsonSet(setId) {
        jsonSets = jsonSets.filter(s => s.id !== setId);
        rebuildMasterList();
        updateJsonBadgeUI();
        refreshAllFromMaster();
    }
    
    function rebuildMasterList() {
        masterQuestions = [];
        for (let set of jsonSets) {
            for (let q of set.questions) {
                masterQuestions.push({
                    ...q,
                    sourceSetId: set.id,
                    originalText: q.text
                });
            }
        }
    }
    
    function updateJsonBadgeUI() {
        const container = document.getElementById("jsonBadgeList");
        if (jsonSets.length === 0) {
            container.innerHTML = '<div class="json-badge">📄 No JSON sets loaded. Add one below.</div>';
            return;
        }
        container.innerHTML = "";
        jsonSets.forEach(set => {
            const badge = document.createElement("div");
            badge.className = "json-badge";
            badge.innerHTML = `📁 ${escapeHtml(set.name)} <button class="remove-json-btn" data-id="${set.id}">✖</button>`;
            badge.querySelector(".remove-json-btn").addEventListener("click", (e) => {
                e.stopPropagation();
                if(confirm(`Remove "${set.name}" and all its questions?`)) {
                    removeJsonSet(set.id);
                }
            });
            container.appendChild(badge);
        });
    }
    
    // Topic filter logic
    function rebuildTopicFilters() {
        const topicsSet = new Set();
        masterQuestions.forEach(q => { topicsSet.add(q.topic || "General"); });
        const container = document.getElementById("topicFilterContainer");
        const allChip = container.querySelector('[data-topic="all"]');
        const otherChips = Array.from(container.querySelectorAll('.topic-chip')).filter(ch => ch.getAttribute('data-topic') !== 'all');
        otherChips.forEach(ch => ch.remove());
        for (let topic of topicsSet) {
            const chip = document.createElement("span");
            chip.className = "topic-chip";
            chip.setAttribute("data-topic", topic);
            chip.innerText = topic;
            chip.addEventListener("click", (e) => {
                document.querySelectorAll('.topic-chip').forEach(c => c.classList.remove('selected'));
                chip.classList.add('selected');
                const selectedTopic = chip.getAttribute('data-topic');
                applyTopicFilter(selectedTopic === 'all' ? null : selectedTopic);
            });
            container.appendChild(chip);
        }
        if(allChip) {
            allChip.addEventListener("click", () => {
                document.querySelectorAll('.topic-chip').forEach(c => c.classList.remove('selected'));
                allChip.classList.add('selected');
                applyTopicFilter(null);
            });
        }
    }
    
    function applyTopicFilter(topic) {
        if (!topic) {
            filteredQuestions = [...masterQuestions];
        } else {
            filteredQuestions = masterQuestions.filter(q => (q.topic || "General") === topic);
        }
        // reset quiz state for new filtered set
        currentIndex = 0;
        userSelections = {};
        verifiedStatus = {};
        userCorrectness = {};
        updateStatsUI();
        if(filteredQuestions.length === 0) {
            document.getElementById("quizSection").style.display = "none";
            document.getElementById("totalQty").innerText = "0";
            return;
        }
        document.getElementById("quizSection").style.display = "block";
        renderCurrentQuestion();
        updateGlobalProgress();
    }
    
    function updateStatsUI() {
        document.getElementById("totalQty").innerText = filteredQuestions.length;
        const answered = Object.keys(userSelections).length;
        document.getElementById("answeredCount").innerText = answered;
        let correctTotal = 0;
        for(let idx in userCorrectness) {
            if(userCorrectness[idx] === true) correctTotal++;
        }
        document.getElementById("correctCount").innerText = correctTotal;
    }
    
    function updateGlobalProgress() {
        let total = filteredQuestions.length;
        let answeredCount = Object.keys(userSelections).length;
        let percent = total === 0 ? 0 : (answeredCount / total) * 100;
        const fill = document.getElementById("progressFill");
        fill.style.width = `${percent}%`;
        fill.innerText = `${Math.round(percent)}%`;
        document.getElementById("questionIndexLabel").innerHTML = `Question ${currentIndex+1} / ${total}`;
    }
    
    function renderCurrentQuestion() {
        if(!filteredQuestions.length) return;
        const q = filteredQuestions[currentIndex];
        if(!q) return;
        const topicHtml = q.topic ? `<span style="font-size:0.7rem; background:#334155; border-radius:20px; padding:2px 10px; margin-left:12px;">${escapeHtml(q.topic)}</span>` : "";
        document.getElementById("questionText").innerHTML = escapeHtml(q.text) + topicHtml;
        const container = document.getElementById("optionsContainer");
        container.innerHTML = "";
        const letters = Object.keys(q.options);
        const savedSelection = userSelections[currentIndex] || [];
        const isVerified = verifiedStatus[currentIndex] || false;
        
        const verifLabel = document.getElementById("verificationStatusLabel");
        if(isVerified) {
            const isCorrect = userCorrectness[currentIndex];
            verifLabel.innerHTML = isCorrect ? "✅ Verified: Correct" : "❌ Verified: Incorrect";
            verifLabel.style.color = isCorrect ? "#86efac" : "#fca5a5";
        } else {
            verifLabel.innerHTML = "⏳ Not verified yet";
            verifLabel.style.color = "#94a3b8";
        }
        
        for(let letter of letters) {
            const optionDiv = document.createElement("div");
            optionDiv.className = "option-item";
            if(savedSelection.includes(letter)) optionDiv.classList.add("selected");
            if(isVerified) {
                const correctAnswers = q.answers;
                if(correctAnswers.includes(letter)) {
                    optionDiv.classList.add("verify-correct");
                } else if(savedSelection.includes(letter) && !correctAnswers.includes(letter)) {
                    optionDiv.classList.add("verify-incorrect");
                }
                optionDiv.classList.add("disabled-option");
                optionDiv.style.cursor = "default";
            } else {
                optionDiv.style.cursor = "pointer";
                optionDiv.onclick = () => toggleOption(letter);
            }
            optionDiv.innerHTML = `<div class="option-letter">${letter}.</div><div class="option-text">${escapeHtml(q.options[letter])}</div>`;
            container.appendChild(optionDiv);
        }
        
        const feedbackDiv = document.getElementById("feedbackPanel");
        if(isVerified) {
            const isAnsCorrect = userCorrectness[currentIndex];
            const correctAnswersList = q.answers.join(", ");
            const userAnswersList = (userSelections[currentIndex] || []).join(", ") || "(none)";
            if(isAnsCorrect) {
                feedbackDiv.innerHTML = `<span style="color:#4ade80;">✓ Correct! Your answer: ${userAnswersList} matches correct answer(s): ${correctAnswersList}</span>`;
            } else {
                feedbackDiv.innerHTML = `<span style="color:#f87171;">✘ Incorrect. Your answer: ${userAnswersList} | Correct: ${correctAnswersList}. ${q.explanation ? 'Explanation: ' + escapeHtml(q.explanation) : ''}</span>`;
            }
            feedbackDiv.style.display = "block";
            document.getElementById("postSubmitHint").innerHTML = "✅ Answer verified. Use 'Reset Quiz' to unverify all answers.";
        } else {
            feedbackDiv.style.display = "none";
            document.getElementById("postSubmitHint").innerHTML = "📝 Select answer(s) and click 'Submit & Verify' to check correctness.";
        }
        updateGlobalProgress();
        updateStatsUI();
    }
    
    function toggleOption(letter) {
        if(verifiedStatus[currentIndex]) {
            alert("Answer already verified for this question. Use 'Reset Quiz' to modify answers.");
            return;
        }
        let currentSelections = userSelections[currentIndex] ? [...userSelections[currentIndex]] : [];
        if(currentSelections.includes(letter)) {
            currentSelections = currentSelections.filter(l => l !== letter);
        } else {
            currentSelections.push(letter);
        }
        userSelections[currentIndex] = currentSelections;
        renderCurrentQuestion();
    }
    
    function verifyCurrentAnswer() {
        if(filteredQuestions.length === 0) return;
        if(verifiedStatus[currentIndex]) {
            alert("This question was already verified. Reset quiz to re-attempt.");
            return;
        }
        const q = filteredQuestions[currentIndex];
        const selected = userSelections[currentIndex] || [];
        if(selected.length === 0) {
            alert("Please select at least one option before verification.");
            return;
        }
        const correctSorted = [...q.answers].sort();
        const selectedSorted = [...selected].sort();
        const isCorrect = JSON.stringify(correctSorted) === JSON.stringify(selectedSorted);
        userCorrectness[currentIndex] = isCorrect;
        verifiedStatus[currentIndex] = true;
        updateStatsUI();
        renderCurrentQuestion();
    }
    
    function nextQuestion() {
        if(filteredQuestions.length === 0) return;
        if(currentIndex + 1 < filteredQuestions.length) {
            currentIndex++;
            renderCurrentQuestion();
        } else {
            if(currentIndex === filteredQuestions.length - 1) {
                alert("You've reached the last question. Click 'Show Results' for summary.");
            }
        }
    }
    
    function prevQuestion() {
        if(currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
        }
    }
    
    function resetQuiz() {
        if(confirm("Reset all progress? All answers and verifications will be cleared for current topic filter.")) {
            userSelections = {};
            verifiedStatus = {};
            userCorrectness = {};
            currentIndex = 0;
            renderCurrentQuestion();
            updateStatsUI();
            updateGlobalProgress();
        }
    }
    
    function showFinalResults() {
        if(filteredQuestions.length === 0) {
            alert("No questions to show results.");
            return;
        }
        let total = filteredQuestions.length;
        let correctCount = 0;
        let resultsHtml = `<div style="color:#e2e8f0;"><h3>📋 Performance Summary</h3><p>Total Questions: ${total}</p>`;
        for(let i=0; i<filteredQuestions.length; i++) {
            if(userCorrectness[i] === true) correctCount++;
        }
        let percentage = total === 0 ? 0 : (correctCount/total)*100;
        resultsHtml += `<p>⭐ Correct (verified): ${correctCount} / ${total} (${percentage.toFixed(1)}%)</p>`;
        resultsHtml += `<hr style="margin:16px 0; border-color:#334155;">`;
        resultsHtml += `<div style="max-height: 320px; overflow-y:auto;">`;
        for(let i=0; i<filteredQuestions.length; i++) {
            const q = filteredQuestions[i];
            const status = verifiedStatus[i] ? (userCorrectness[i] ? "✓ Correct" : "✗ Wrong") : "⚪ Not verified";
            const userAns = (userSelections[i] || []).join(", ") || "—";
            const correctAns = q.answers.join(", ");
            resultsHtml += `<div style="background:#111827; margin-bottom:12px; padding:12px; border-radius:20px;">
                <div><strong>Q${i+1}</strong> ${escapeHtml(q.text.substring(0,80))} <span style="color:#a78bfa;">[${status}]</span></div>
                <div style="font-size:0.75rem;">Your: ${userAns} | Correct: ${correctAns}</div>
                ${q.explanation ? `<div style="font-size:0.7rem; color:#9ca3af;">💡 ${escapeHtml(q.explanation)}</div>` : ''}
            </div>`;
        }
        resultsHtml += `</div><div style="margin-top:16px;">🔁 Use Reset Quiz to retry.</div></div>`;
        document.getElementById("modalResultsBody").innerHTML = resultsHtml;
        document.getElementById("resultsModal").style.display = "flex";
    }
    
    function refreshAllFromMaster() {
        if(masterQuestions.length === 0) {
            document.getElementById("quizSection").style.display = "none";
            document.getElementById("totalQty").innerText = "0";
            document.getElementById("jsonBadgeList").innerHTML = '<div class="json-badge">📄 No JSON sets loaded. Add one below.</div>';
            document.getElementById("topicFilterContainer").querySelectorAll('.topic-chip:not([data-topic="all"])').forEach(ch => ch.remove());
            return;
        }
        rebuildTopicFilters();
        applyTopicFilter(null);
        updateStatsUI();
    }
    
    // Handle adding new JSON via textarea
    function handleAddJson() {
        const rawJson = document.getElementById("newJsonInput").value.trim();
        if(!rawJson) {
            alert("Paste a JSON array of questions.");
            return;
        }
        let parsed;
        try {
            parsed = JSON.parse(rawJson);
            if (!Array.isArray(parsed)) throw new Error("Must be an array");
        } catch(e) {
            alert("Invalid JSON format: " + e.message);
            return;
        }
        const success = addJsonSet(parsed, `Custom Set (${parsed.length} q)`);
        if(success) {
            document.getElementById("newJsonInput").value = "";
        }
    }
    
    function escapeHtml(str) { if(!str) return ""; return String(str).replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;});}
    
    // Load the two default JSON sets exactly as provided
    function loadPresetJsonSets() {
        const sampleSet1 = [
            { "q_num": 1, "text": "Which interface is used for batch Apex in Salesforce?", "options": { "A": "Database.Batchable", "B": "Schedulable", "C": "Queueable", "D": "Iterable" }, "answers": ["A"], "topic": "Apex", "explanation": "Database.Batchable interface is required for batch classes." },
            { "text": "What does SOQL injection prevent?", "options": { "A": "DML statements", "B": "Dynamic SOQL escaping", "C": "Cross-site scripting", "D": "All of above" }, "answers": ["B"], "topic": "Security", "explanation": "Using escapeSingleQuotes prevents SOQL injection." }
        ];
        const sampleSet2 = [
            { "text": "Platform Events are used for? (choose two)", "options": { "A": "Real-time decoupled communication", "B": "Synchronous callouts", "C": "Publish/Subscribe model", "D": "Batch data loads" }, "answers": ["A","C"], "topic": "Integration", "explanation": "Platform Events follow event-driven messaging." },
            { "text": "Which annotation is used to expose Apex REST method?", "options": { "A": "@AuraEnabled", "B": "@RestResource", "C": "@HttpPost", "D": "@RemoteAction" }, "answers": ["B"], "topic": "API", "explanation": "@RestResource defines REST web service class." }
        ];
        addJsonSet(sampleSet1, "PD2 Core Set");
        addJsonSet(sampleSet2, "Integration & API Set");
    }
    
    // Event listeners
    document.getElementById("addJsonBtn").addEventListener("click", handleAddJson);
    document.getElementById("prevBtn").addEventListener("click", prevQuestion);
    document.getElementById("nextBtn").addEventListener("click", nextQuestion);
    document.getElementById("submitCheckBtn").addEventListener("click", verifyCurrentAnswer);
    document.getElementById("resetAllBtn").addEventListener("click", resetQuiz);
    document.getElementById("showFinalResultsBtn").addEventListener("click", showFinalResults);
    document.getElementById("closeModalBtn").addEventListener("click", () => document.getElementById("resultsModal").style.display = "none");
    window.onclick = function(e) { if(e.target === document.getElementById("resultsModal")) document.getElementById("resultsModal").style.display = "none"; };
    
    // Initialize
    loadPresetJsonSets();
</script>
</body>
