<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PD2 Exam Simulator</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 32px 16px;
        }

        .screen { width: 100%; max-width: 680px; animation: fadeUp 0.35s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

        /* ── SCREEN 1 ── */
        .sel-header { text-align: center; margin-bottom: 36px; }
        .sel-header h1 {
            font-size: 1.75rem; font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            margin-bottom: 6px;
        }
        .sel-header p { color: #64748b; font-size: 0.88rem; }

        .set-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }

        .set-card {
            background: #1e293b; border: 2px solid #334155; border-radius: 20px;
            padding: 28px 20px; cursor: pointer; transition: all 0.2s;
            text-align: center; user-select: none; position: relative;
        }
        .set-card:hover { border-color: #475569; background: #243047; }
        .set-card.selected { border-color: #6d28d9; background: #1e1b4b; }
        .set-card.selected::after {
            content: "✓"; position: absolute; top: 12px; right: 14px;
            background: #7c3aed; color: white; font-size: 0.72rem; font-weight: 700;
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .set-icon { font-size: 2.2rem; margin-bottom: 14px; }
        .set-name { color: #e2e8f0; font-weight: 600; font-size: 0.95rem; margin-bottom: 6px; }
        .set-count { color: #64748b; font-size: 0.8rem; }
        .set-card.selected .set-name { color: #a78bfa; }
        .set-card.selected .set-count { color: #7c6fcd; }

        .set-card.error-card { cursor: default; opacity: 0.5; }

        .start-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(95deg, #7c3aed, #2563eb);
            border: none; border-radius: 16px;
            color: white; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: 0.2s;
        }
        .start-btn:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
        .start-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .sel-note { text-align: center; color: #475569; font-size: 0.78rem; margin-top: 14px; }

        /* ── SCREEN 2 ── */
        .quiz-topbar {
            display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
        }
        .back-btn {
            background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 8px 14px; color: #94a3b8; font-size: 0.85rem;
            cursor: pointer; transition: 0.18s; white-space: nowrap; flex-shrink: 0;
        }
        .back-btn:hover { border-color: #475569; color: #e2e8f0; }
        .quiz-title { color: #64748b; font-size: 0.82rem; }
        .quiz-title strong { color: #cbd5e1; }

        .stats-strip {
            background: #0f172a; border-radius: 14px; padding: 10px 18px;
            display: flex; gap: 20px; flex-wrap: wrap; font-size: 0.78rem;
            color: #475569; margin-bottom: 16px;
        }
        .stats-strip strong { color: #cbd5e1; }

        .progress-bar {
            background: #1e293b; border-radius: 20px; height: 22px;
            overflow: hidden; margin-bottom: 8px;
        }
        .progress-fill {
            background: linear-gradient(90deg, #7c3aed, #2563eb);
            height: 100%; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 0.72rem;
            transition: width 0.4s ease; min-width: 2rem;
        }
        .progress-meta {
            display: flex; justify-content: space-between;
            font-size: 0.78rem; color: #475569; margin-bottom: 18px;
        }

        .question-card {
            background: #1e293b; border-radius: 24px;
            padding: 26px; border: 1px solid #334155; margin-bottom: 16px;
        }
        .q-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .q-tag {
            background: #0f172a; color: #64748b; font-size: 0.72rem;
            border: 1px solid #334155; border-radius: 20px; padding: 3px 10px;
        }
        .q-tag.multi { color: #fbbf24; border-color: #78350f; background: #1c1008; }

        .question-text {
            font-size: 1.08rem; font-weight: 500; color: #f1f5f9;
            line-height: 1.6; margin-bottom: 22px; white-space: pre-wrap;
        }

        .options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }

        .opt {
            background: #0f172a; border: 1.5px solid #334155; border-radius: 14px;
            padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px;
            cursor: pointer; transition: all 0.16s; line-height: 1.5;
        }
        .opt:hover:not(.locked) { background: #1a2744; border-color: #6d28d9; }
        .opt.selected { background: #0f1e3d; border-color: #3b82f6; }
        .opt.locked { cursor: default; }
        .opt.show-correct { background: #052e16; border-color: #16a34a; }
        .opt.show-wrong   { background: #3b0a0a; border-color: #dc2626; }

        .opt-letter { color: #a78bfa; font-weight: 700; font-size: 0.95rem; min-width: 24px; flex-shrink: 0; padding-top: 1px; }
        .opt-text   { color: #cbd5e1; font-size: 0.88rem; white-space: pre-wrap; }

        .feedback {
            border-radius: 12px; padding: 13px 16px; font-size: 0.85rem;
            line-height: 1.55; margin-top: 2px; display: none;
        }
        .feedback.correct { background: #052e16; border-left: 3px solid #16a34a; color: #bbf7d0; border-radius: 0 12px 12px 0; }
        .feedback.wrong   { background: #3b0a0a; border-left: 3px solid #dc2626; color: #fecaca; border-radius: 0 12px 12px 0; }
        .hint { text-align: center; font-size: 0.76rem; color: #334155; margin-top: 10px; }

        .nav-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 11px 22px; border-radius: 40px; border: none;
            font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.16s;
        }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn:not(:disabled):hover { filter: brightness(1.12); }
        .btn-gray   { background: #334155; color: #e2e8f0; }
        .btn-blue   { background: #1d4ed8; color: #fff; }
        .btn-green  { background: #065f46; color: #fff; }
        .btn-amber  { background: #92400e; color: #fff; }
        .btn-purple { background: #5b21b6; color: #fff; }

        /* Results modal */
        .modal-wrap {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.72); z-index: 100;
            align-items: flex-start; justify-content: center;
            padding: 40px 16px; overflow-y: auto;
        }
        .modal-wrap.open { display: flex; }
        .modal-box {
            background: #1e293b; border-radius: 24px; border: 1px solid #334155;
            padding: 26px; width: 100%; max-width: 680px; animation: fadeUp 0.25s ease;
        }
        .modal-title { font-size: 1.2rem; font-weight: 700; color: #f1f5f9; margin-bottom: 18px; }
        .score-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
        .score-box { background: #0f172a; border-radius: 14px; padding: 14px 20px; flex: 1; min-width: 90px; }
        .score-num { font-size: 1.9rem; font-weight: 800; color: #e2e8f0; }
        .score-lbl { font-size: 0.72rem; color: #475569; margin-top: 2px; }
        .result-item { background: #0f172a; border-radius: 12px; padding: 11px 14px; margin-bottom: 8px; }
        .ri-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; font-size: 0.83rem; color: #cbd5e1; margin-bottom: 4px; }
        .ri-ans { font-size: 0.75rem; color: #475569; }
        .results-scroll { max-height: 340px; overflow-y: auto; }
        .modal-btns { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }

        @media (max-width: 480px) {
            .set-grid { grid-template-columns: 1fr; }
            .question-text { font-size: 0.98rem; }
        }
    </style>
</head>
<body>

<!-- ══════════════════ SCREEN 1: Set Selection ══════════════════ -->
<div class="screen" id="screen1">
    <div class="sel-header">
        <h1>📚 PD2 Exam Simulator</h1>
        <p>Choose one or both question sets, then start the quiz</p>
    </div>

    <div class="set-grid" id="setGrid">
        <div class="set-card error-card"><div class="set-icon">⏳</div><div class="set-name">Loading…</div></div>
        <div class="set-card error-card"><div class="set-icon">⏳</div><div class="set-name">Loading…</div></div>
    </div>

    <button class="start-btn" id="startBtn" disabled>Select a set to start →</button>
    <p class="sel-note" id="selNote">No sets selected</p>
</div>

<!-- ══════════════════ SCREEN 2: Quiz ══════════════════ -->
<div class="screen" id="screen2" style="display:none;">
    <div class="quiz-topbar">
        <button class="back-btn" id="backBtn">← Sets</button>
        <div class="quiz-title" id="quizTitle"></div>
    </div>

    <div class="stats-strip">
        <span>Total <strong id="statTotal">0</strong></span>
        <span>Answered <strong id="statAnswered">0</strong></span>
        <span>Correct <strong id="statCorrect">0</strong></span>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progressFill">0%</div></div>
    <div class="progress-meta">
        <span id="qLabel">Q 1 / 0</span>
        <span id="verifLabel">Not verified</span>
    </div>

    <div class="question-card">
        <div class="q-meta" id="qMeta"></div>
        <div class="question-text" id="qText"></div>
        <div class="options-list" id="optsList"></div>
        <div class="feedback" id="feedback"></div>
        <div class="hint" id="hint"></div>
    </div>

    <div class="nav-row">
        <button class="btn btn-gray"   id="prevBtn">◀ Prev</button>
        <button class="btn btn-blue"   id="submitBtn">✓ Submit</button>
        <button class="btn btn-green"  id="nextBtn">Next ▶</button>
        <button class="btn btn-amber"  id="resetBtn">⟳ Reset</button>
        <button class="btn btn-purple" id="resultsBtn">🏆 Results</button>
    </div>
</div>

<!-- Results modal -->
<div class="modal-wrap" id="modal">
    <div class="modal-box">
        <div class="modal-title">📊 Results</div>
        <div class="score-row" id="scoreRow"></div>
        <div class="results-scroll" id="resultsList"></div>
        <div class="modal-btns">
            <button class="btn btn-gray"  id="closeModal">Close</button>
            <button class="btn btn-amber" id="resetFromModal">⟳ Reset</button>
        </div>
    </div>
</div>

<script>
/* ══ CONFIG ══ */
const SETS_CONFIG = [
    { id: "s1", label: "Set 1 – PD2 Core",       icon: "📘", file: "questions1.json" },
    { id: "s2", label: "Set 2 – Security & API",  icon: "🔐", file: "questions2.json" },
];

/* ══ STATE ══ */
let loadedSets  = {};
let selectedIds = new Set();
let activeQ     = [];
let idx         = 0;
let selections  = {};
let verified    = {};
let correctness = {};

/* ══ BOOT: load all JSON sets ══ */
(async () => {
    const results = await Promise.allSettled(
        SETS_CONFIG.map(cfg =>
            fetch(cfg.file).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        )
    );
    const grid = document.getElementById("setGrid");
    grid.innerHTML = "";
    results.forEach((res, i) => {
        const cfg = SETS_CONFIG[i];
        const card = document.createElement("div");
        if (res.status === "fulfilled") {
            const qs = normalise(res.value);
            loadedSets[cfg.id] = { label: cfg.label, questions: qs };
            card.className = "set-card";
            card.dataset.id = cfg.id;
            card.innerHTML = `<div class="set-icon">${cfg.icon}</div>
                <div class="set-name">${cfg.label}</div>
                <div class="set-count">${qs.length} questions</div>`;
            card.addEventListener("click", () => toggleSet(cfg.id, card));
        } else {
            card.className = "set-card error-card";
            card.innerHTML = `<div class="set-icon">⚠️</div>
                <div class="set-name">${cfg.label}</div>
                <div class="set-count">Could not load file</div>`;
        }
        grid.appendChild(card);
    });
})();

/* ══ TOGGLE SET SELECTION ══ */
function toggleSet(id, card) {
    selectedIds.has(id) ? (selectedIds.delete(id), card.classList.remove("selected"))
                        : (selectedIds.add(id),    card.classList.add("selected"));
    const n = selectedIds.size;
    const total = countSelected();
    const btn = document.getElementById("startBtn");
    btn.disabled = n === 0;
    btn.textContent = n === 0 ? "Select a set to start →"
                    : `Start Quiz — ${total} questions →`;
    document.getElementById("selNote").textContent =
        n === 0 ? "No sets selected" : `${n} set${n > 1 ? "s" : ""} · ${total} questions`;
}

function countSelected() {
    return [...selectedIds].reduce((a, id) => a + (loadedSets[id]?.questions.length || 0), 0);
}

/* ══ START QUIZ ══ */
document.getElementById("startBtn").addEventListener("click", () => {
    activeQ = [...selectedIds].flatMap(id =>
        loadedSets[id].questions.map(q => ({ ...q, _setLabel: loadedSets[id].label }))
    );
    if (!activeQ.length) return;
    idx = 0; selections = {}; verified = {}; correctness = {};
    const names = [...selectedIds].map(id => loadedSets[id].label).join(" + ");
    document.getElementById("quizTitle").innerHTML =
        `<strong>${names}</strong> &nbsp;·&nbsp; ${activeQ.length} questions`;
    showScreen(2);
    render();
});

/* ══ BACK ══ */
document.getElementById("backBtn").addEventListener("click", () => showScreen(1));

function showScreen(n) {
    document.getElementById("screen1").style.display = n === 1 ? "block" : "none";
    document.getElementById("screen2").style.display = n === 2 ? "block" : "none";
}

/* ══ RENDER QUESTION ══ */
function render() {
    if (!activeQ.length) return;
    const q     = activeQ[idx];
    const isvfd = !!verified[idx];
    const mysel = selections[idx] || [];
    const total = activeQ.length;

    const pct = Math.round(Object.keys(verified).length / total * 100);
    document.getElementById("progressFill").style.width = pct + "%";
    document.getElementById("progressFill").textContent = pct + "%";
    document.getElementById("qLabel").textContent = `Q ${idx + 1} / ${total}`;

    const vl = document.getElementById("verifLabel");
    if (isvfd) {
        vl.textContent = correctness[idx] ? "✅ Correct" : "❌ Incorrect";
        vl.style.color = correctness[idx] ? "#4ade80" : "#f87171";
    } else { vl.textContent = "Not verified"; vl.style.color = "#475569"; }

    document.getElementById("qMeta").innerHTML =
        `<span class="q-tag">Q${q.num}</span>
         <span class="q-tag">${esc(q._setLabel)}</span>
         ${q.answers.length > 1 ? `<span class="q-tag multi">Choose ${q.answers.length}</span>` : ""}`;

    document.getElementById("qText").textContent = q.text;

    const letters = Object.keys(q.options);
    document.getElementById("optsList").innerHTML = letters.map(letter => {
        let cls = "opt";
        if (mysel.includes(letter)) cls += " selected";
        if (isvfd) {
            cls += " locked";
            if (q.answers.includes(letter)) cls += " show-correct";
            else if (mysel.includes(letter)) cls += " show-wrong";
        }
        return `<div class="${cls}" data-l="${letter}">
            <span class="opt-letter">${letter}.</span>
            <span class="opt-text">${esc(q.options[letter])}</span>
        </div>`;
    }).join("");

    if (!isvfd) {
        document.querySelectorAll(".opt").forEach(el =>
            el.addEventListener("click", () => toggleOpt(el.dataset.l))
        );
    }

    const fb = document.getElementById("feedback");
    if (isvfd) {
        const ok = correctness[idx];
        fb.className = "feedback " + (ok ? "correct" : "wrong");
        const exp = q.explanation ? `<br><br>💡 ${esc(q.explanation)}` : "";
        fb.innerHTML = `<strong>${ok ? "Correct!" : "Incorrect."}</strong>
            &nbsp;Your: <strong>${mysel.join(", ") || "—"}</strong>
            &nbsp;·&nbsp; Correct: <strong>${q.answers.join(", ")}</strong>${exp}`;
        fb.style.display = "block";
    } else {
        fb.style.display = "none";
    }

    document.getElementById("hint").innerHTML = isvfd
        ? "Verified — use Prev / Next to navigate or Reset to retry."
        : "Select answer(s) and click <strong>Submit</strong> to check.";

    document.getElementById("prevBtn").disabled   = idx === 0;
    document.getElementById("nextBtn").disabled   = idx === total - 1;
    document.getElementById("submitBtn").disabled = isvfd;

    updateStats();
}

/* ══ OPTION TOGGLE ══ */
function toggleOpt(letter) {
    if (verified[idx]) return;
    let sel = selections[idx] ? [...selections[idx]] : [];
    sel.includes(letter) ? (sel = sel.filter(l => l !== letter)) : sel.push(letter);
    selections[idx] = sel;
    render();
}

/* ══ NAV ══ */
document.getElementById("prevBtn").addEventListener("click", () => { if (idx > 0)                    { idx--; render(); } });
document.getElementById("nextBtn").addEventListener("click", () => { if (idx < activeQ.length - 1)  { idx++; render(); } });

document.getElementById("submitBtn").addEventListener("click", () => {
    if (verified[idx]) return;
    const sel = selections[idx] || [];
    if (!sel.length) { alert("Select at least one option."); return; }
    const q = activeQ[idx];
    correctness[idx] = JSON.stringify([...sel].sort()) === JSON.stringify([...q.answers].sort());
    verified[idx] = true;
    render();
});

document.getElementById("resetBtn").addEventListener("click", () => {
    if (!confirm("Reset all answers and progress?")) return;
    idx = 0; selections = {}; verified = {}; correctness = {};
    updateStats(); render();
});

/* ══ STATS ══ */
function updateStats() {
    document.getElementById("statTotal").textContent    = activeQ.length;
    document.getElementById("statAnswered").textContent = Object.keys(verified).length;
    document.getElementById("statCorrect").textContent  = Object.values(correctness).filter(Boolean).length;
}

/* ══ RESULTS ══ */
document.getElementById("resultsBtn").addEventListener("click", () => {
    const total   = activeQ.length;
    const correct = Object.values(correctness).filter(Boolean).length;
    const pct     = ((correct / total) * 100).toFixed(1);

    document.getElementById("scoreRow").innerHTML = `
        <div class="score-box">
            <div class="score-num" style="color:${pct >= 70 ? '#4ade80' : '#f87171'}">${pct}%</div>
            <div class="score-lbl">${pct >= 70 ? "Pass" : "Keep practicing"}</div>
        </div>
        <div class="score-box">
            <div class="score-num">${correct}/${total}</div>
            <div class="score-lbl">Correct</div>
        </div>
        <div class="score-box">
            <div class="score-num">${Object.keys(verified).length}</div>
            <div class="score-lbl">Verified</div>
        </div>`;

    document.getElementById("resultsList").innerHTML = activeQ.map((q, i) => {
        const st = verified[i]
            ? (correctness[i]
                ? '<span style="color:#4ade80;white-space:nowrap">✓ Correct</span>'
                : '<span style="color:#f87171;white-space:nowrap">✗ Wrong</span>')
            : '<span style="color:#475569;white-space:nowrap">— Skipped</span>';
        const your = (selections[i] || []).join(", ") || "—";
        return `<div class="result-item">
            <div class="ri-top">
                <span><strong>Q${q.num}</strong> ${esc(q.text.slice(0, 72))}${q.text.length > 72 ? "…" : ""}</span>
                ${st}
            </div>
            <div class="ri-ans">Your: ${your} &nbsp;·&nbsp; Correct: ${q.answers.join(", ")}</div>
            ${q.explanation ? `<div class="ri-ans" style="margin-top:4px;color:#334155">💡 ${esc(q.explanation)}</div>` : ""}
        </div>`;
    }).join("");

    document.getElementById("modal").classList.add("open");
});

document.getElementById("closeModal").addEventListener("click", () =>
    document.getElementById("modal").classList.remove("open"));

document.getElementById("resetFromModal").addEventListener("click", () => {
    document.getElementById("modal").classList.remove("open");
    idx = 0; selections = {}; verified = {}; correctness = {};
    updateStats(); render();
});

document.getElementById("modal").addEventListener("click", function(e) {
    if (e.target === this) this.classList.remove("open");
});

/* ══ HELPERS ══ */
function normalise(arr) {
    return arr.map((q, i) => ({
        num:         q.q_num ?? (i + 1),
        text:        (q.text || q.question || "").trim(),
        options:     q.options || {},
        answers:     Array.isArray(q.answers) ? q.answers.map(String) : [],
        explanation: q.explanation || ""
    })).filter(q => q.text && Object.keys(q.options).length && q.answers.length);
}

function esc(s) {
    return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
</script>
</body>
</html>
