<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PD2 Exam Simulator</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            padding: 24px 16px;
            color: #e2e8f0;
        }

        .container { max-width: 900px; margin: 0 auto; }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 28px 20px 22px;
            background: rgba(255,255,255,0.07);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 1.9rem;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }
        .header p { color: #94a3b8; font-size: 0.9rem; }

        /* ── Panel card ── */
        .card {
            background: #1e293b;
            border-radius: 24px;
            padding: 22px 24px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }
        .card-title {
            font-weight: 700;
            font-size: 1rem;
            color: #cbd5e1;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── File selector ── */
        .file-set-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 14px;
        }

        .file-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 40px;
            padding: 9px 18px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            font-size: 0.88rem;
            color: #94a3b8;
        }
        .file-toggle input[type="checkbox"] { display: none; }
        .file-toggle.checked {
            background: #1d4ed8;
            border-color: #3b82f6;
            color: #fff;
            box-shadow: 0 0 8px #3b82f640;
        }
        .file-toggle .checkmark {
            width: 16px; height: 16px;
            border-radius: 4px;
            border: 2px solid #475569;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem;
            flex-shrink: 0;
        }
        .file-toggle.checked .checkmark {
            background: #3b82f6;
            border-color: #3b82f6;
        }
        .file-badge {
            font-size: 0.72rem;
            background: #334155;
            border-radius: 20px;
            padding: 2px 8px;
            margin-left: 4px;
        }
        .file-toggle.checked .file-badge { background: #1e40af; }

        /* upload button */
        .upload-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #0f172a;
            border: 1px dashed #475569;
            border-radius: 40px;
            padding: 9px 18px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #64748b;
            transition: 0.2s;
        }
        .upload-label:hover { border-color: #2dd4bf; color: #2dd4bf; }
        .upload-label input { display: none; }

        .load-btn {
            background: linear-gradient(95deg, #8b5cf6, #3b82f6);
            border: none;
            padding: 10px 26px;
            border-radius: 40px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .load-btn:hover { transform: scale(1.02); }
        .load-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* stats strip */
        .stats-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: #0f172a;
            border-radius: 16px;
            padding: 10px 18px;
            font-size: 0.82rem;
            color: #64748b;
            margin-top: 14px;
        }
        .stats-strip strong { color: #e2e8f0; }

        /* ── Progress ── */
        .progress-bar {
            background: #0f172a;
            border-radius: 20px;
            height: 26px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            background: linear-gradient(90deg, #8b5cf6, #3b82f6);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.78rem;
            transition: width 0.4s ease;
            min-width: 2rem;
        }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            color: #64748b;
        }

        /* ── Question card ── */
        .question-card {
            background: #0f172a;
            border-radius: 24px;
            padding: 26px;
            border: 1px solid #334155;
            margin-bottom: 18px;
        }

        .question-meta {
            font-size: 0.75rem;
            color: #475569;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .q-tag {
            background: #1e293b;
            border-radius: 20px;
            padding: 2px 10px;
            border: 1px solid #334155;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 500;
            line-height: 1.55;
            color: #f1f5f9;
            margin-bottom: 22px;
            white-space: pre-wrap;
        }

        /* options */
        .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

        .option {
            background: #1e293b;
            border: 1.5px solid #334155;
            border-radius: 16px;
            padding: 13px 18px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            cursor: pointer;
            transition: all 0.18s;
            line-height: 1.45;
        }
        .option:hover:not(.locked) { background: #263354; border-color: #6d28d9; }
        .option.selected   { background: #1e3a5f; border-color: #3b82f6; }
        .option.locked     { cursor: default; }
        .option.show-correct   { background: #14532d; border-color: #22c55e !important; }
        .option.show-wrong     { background: #7f1d1d; border-color: #ef4444 !important; }

        .opt-letter {
            font-weight: 700;
            color: #a78bfa;
            min-width: 28px;
            font-size: 1rem;
            flex-shrink: 0;
            padding-top: 1px;
        }
        .opt-text { font-size: 0.9rem; color: #cbd5e1; white-space: pre-wrap; }

        /* feedback */
        .feedback {
            background: #111827;
            border-left: 4px solid #8b5cf6;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 0.88rem;
            color: #d1d5db;
            margin-top: 4px;
            display: none;
        }
        .feedback.correct { border-left-color: #22c55e; }
        .feedback.wrong   { border-left-color: #ef4444; }

        /* hint */
        .hint-line {
            text-align: center;
            font-size: 0.78rem;
            color: #475569;
            margin-top: 8px;
        }

        /* ── Nav buttons ── */
        .nav-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 4px;
        }
        .btn {
            padding: 11px 22px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            transition: 0.18s;
        }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-gray    { background: #334155; color: #e2e8f0; }
        .btn-blue    { background: #2563eb; color: #fff; }
        .btn-green   { background: #059669; color: #fff; }
        .btn-amber   { background: #d97706; color: #fff; }
        .btn-purple  { background: #7c3aed; color: #fff; }
        .btn:not(:disabled):hover { filter: brightness(1.12); }

        /* ── Empty / loading states ── */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #475569;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .loading { display: flex; align-items: center; gap: 10px; color: #64748b; font-size: 0.9rem; }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            z-index: 100;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 16px;
            overflow-y: auto;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #1e293b;
            border-radius: 24px;
            border: 1px solid #475569;
            padding: 26px;
            width: 100%;
            max-width: 740px;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
        .modal-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 18px; color: #f1f5f9; }
        .result-item {
            background: #0f172a;
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        .result-item .ri-top { display: flex; justify-content: space-between; margin-bottom: 4px; color: #cbd5e1; }
        .result-item .ri-ans { font-size: 0.78rem; color: #64748b; }
        .score-summary {
            background: #0f172a;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 18px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .score-big { font-size: 2rem; font-weight: 800; }
        .score-label { font-size: 0.8rem; color: #64748b; }

        @media (max-width: 600px) {
            .question-text { font-size: 1rem; }
            .header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Header -->
    <div class="header">
        <h1>📚 PD2 Exam Simulator</h1>
        <p>Load question sets · Select options · Submit &amp; verify your answers</p>
    </div>

    <!-- File Selector Panel -->
    <div class="card" id="filePanel">
        <div class="card-title">🗂️ Question Sets</div>

        <div class="file-set-row" id="fileToggleRow">
            <!-- built-in set toggles injected here -->
        </div>

        <!-- Upload custom JSON -->
        <label class="upload-label">
            <input type="file" id="uploadInput" accept=".json" multiple>
            ➕ Upload custom JSON file(s)
        </label>

        <br><br>
        <button class="load-btn" id="loadBtn">▶ Load Selected Sets</button>

        <div class="stats-strip" id="statsStrip">
            <span>📚 Total: <strong id="totalQty">0</strong></span>
            <span>✅ Answered: <strong id="answeredQty">0</strong></span>
            <span>⭐ Correct: <strong id="correctQty">0</strong></span>
            <span id="setNames" style="color:#475569;"></span>
        </div>
    </div>

    <!-- Quiz Area -->
    <div id="quizArea">
        <div class="empty-state">
            <div class="icon">📝</div>
            <div>Select one or more question sets above and click <strong>Load Selected Sets</strong></div>
        </div>
    </div>

</div>

<!-- Results Modal -->
<div class="modal-overlay" id="resultsModal">
    <div class="modal-box">
        <div class="modal-title">📊 Quiz Results</div>
        <div id="modalBody"></div>
        <div style="margin-top:18px; display:flex; gap:10px;">
            <button class="btn btn-gray" id="closeModal">Close</button>
            <button class="btn btn-amber" id="resetFromModal">⟳ Reset &amp; Retry</button>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG: built-in JSON file paths (relative to this HTML)
// ═══════════════════════════════════════════════════════
const BUILTIN_SETS = [
    { id: "set1", label: "Set 1 – PD2 Core",     file: "questions1.json" },
    { id: "set2", label: "Set 2 – Security & API", file: "questions2.json" },
];

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let loadedSets   = [];   // { id, label, questions:[] }
let activeQ      = [];   // flattened, filtered questions
let idx          = 0;
let selections   = {};   // idx → [letters]
let verified     = {};   // idx → bool
let correctness  = {};   // idx → bool

// ═══════════════════════════════════════════════════════
//  BOOT: render built-in toggles
// ═══════════════════════════════════════════════════════
(function buildToggles() {
    const row = document.getElementById("fileToggleRow");
    BUILTIN_SETS.forEach(set => {
        const label = document.createElement("label");
        label.className = "file-toggle";
        label.dataset.id = set.id;
        label.innerHTML = `
            <input type="checkbox" value="${set.id}">
            <span class="checkmark">✓</span>
            <span>${set.label}</span>
            <span class="file-badge" id="badge-${set.id}">—</span>`;
        label.querySelector("input").addEventListener("change", e => {
            label.classList.toggle("checked", e.target.checked);
        });
        row.appendChild(label);
    });
})();

// ═══════════════════════════════════════════════════════
//  UPLOAD custom JSON
// ═══════════════════════════════════════════════════════
document.getElementById("uploadInput").addEventListener("change", async function() {
    const row = document.getElementById("fileToggleRow");
    for (const file of this.files) {
        try {
            const text = await file.text();
            const data = JSON.parse(text);
            if (!Array.isArray(data)) { alert(`${file.name}: JSON must be an array.`); continue; }
            const uid = "custom_" + Date.now() + "_" + file.name;
            const label = document.createElement("label");
            label.className = "file-toggle checked";
            label.dataset.id = uid;
            label.innerHTML = `
                <input type="checkbox" checked value="${uid}">
                <span class="checkmark">✓</span>
                <span>${file.name}</span>
                <span class="file-badge">${data.length} q</span>`;
            label.querySelector("input").addEventListener("change", e => {
                label.classList.toggle("checked", e.target.checked);
            });
            row.appendChild(label);
            // cache the data immediately
            label._cachedData = data;
        } catch(e) {
            alert(`Failed to parse ${file.name}: ${e.message}`);
        }
    }
    this.value = "";
});

// ═══════════════════════════════════════════════════════
//  LOAD SELECTED SETS
// ═══════════════════════════════════════════════════════
document.getElementById("loadBtn").addEventListener("click", loadSelected);

async function loadSelected() {
    const checked = Array.from(document.querySelectorAll(".file-toggle.checked input"));
    if (!checked.length) { alert("Please select at least one question set."); return; }

    const btn = document.getElementById("loadBtn");
    btn.disabled = true;
    btn.textContent = "Loading…";
    showLoading();

    loadedSets = [];

    for (const input of checked) {
        const labelEl = input.closest(".file-toggle");
        const uid = labelEl.dataset.id;

        // custom uploaded file — data already cached
        if (uid.startsWith("custom_")) {
            if (labelEl._cachedData) {
                loadedSets.push({
                    id: uid,
                    label: labelEl.querySelector("span:nth-of-type(2)").textContent,
                    questions: normalise(labelEl._cachedData)
                });
            }
            continue;
        }

        // built-in file — fetch from server
        const setDef = BUILTIN_SETS.find(s => s.id === uid);
        if (!setDef) continue;
        try {
            const res = await fetch(setDef.file);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (!Array.isArray(data)) throw new Error("JSON must be an array");
            const badge = document.getElementById(`badge-${uid}`);
            if (badge) badge.textContent = data.length + " q";
            loadedSets.push({ id: uid, label: setDef.label, questions: normalise(data) });
        } catch(e) {
            alert(`Could not load "${setDef.label}": ${e.message}`);
        }
    }

    btn.disabled = false;
    btn.textContent = "▶ Load Selected Sets";

    if (!loadedSets.length) { showEmpty(); return; }

    // flatten & start quiz
    activeQ = loadedSets.flatMap((s, si) =>
        s.questions.map((q, qi) => ({ ...q, _setLabel: s.label, _globalNum: qi + 1 }))
    );
    idx = 0;
    selections = {};
    verified   = {};
    correctness = {};
    updateStats();
    renderQuiz();
}

// Normalise a raw JSON array into consistent shape
function normalise(arr) {
    return arr.map((q, i) => ({
        num:     q.q_num ?? (i + 1),
        text:    (q.text || q.question || "").trim(),
        options: q.options || {},
        answers: Array.isArray(q.answers) ? q.answers.map(a => String(a).trim()) : [],
        explanation: q.explanation || q.rationale || ""
    })).filter(q => q.text && Object.keys(q.options).length && q.answers.length);
}

// ═══════════════════════════════════════════════════════
//  QUIZ RENDER
// ═══════════════════════════════════════════════════════
function renderQuiz() {
    const area = document.getElementById("quizArea");
    if (!activeQ.length) { showEmpty(); return; }
    const q = activeQ[idx];
    const isVerified = !!verified[idx];
    const mySelect   = selections[idx] || [];

    // progress
    const pct = Math.round(Object.keys(verified).length / activeQ.length * 100);

    // options HTML
    const letters = Object.keys(q.options);
    const optHtml = letters.map(letter => {
        let cls = "option";
        if (mySelect.includes(letter)) cls += " selected";
        if (isVerified) {
            cls += " locked";
            if (q.answers.includes(letter)) cls += " show-correct";
            else if (mySelect.includes(letter)) cls += " show-wrong";
        }
        const clickAttr = isVerified ? "" : `onclick="toggleOpt('${letter}')"`;
        return `<div class="${cls}" ${clickAttr}>
            <span class="opt-letter">${letter}.</span>
            <span class="opt-text">${esc(q.options[letter])}</span>
        </div>`;
    }).join("");

    // feedback
    let feedbackHtml = "";
    if (isVerified) {
        const ok = correctness[idx];
        const fc = ok ? "correct" : "wrong";
        const icon = ok ? "✅" : "❌";
        const yourAns = mySelect.join(", ") || "—";
        const correctAns = q.answers.join(", ");
        const expLine = q.explanation ? `<br><br>💡 ${esc(q.explanation)}` : "";
        feedbackHtml = `<div class="feedback ${fc}" style="display:block;">
            ${icon} <strong>${ok ? "Correct!" : "Incorrect."}</strong>
            &nbsp;Your answer: <strong>${yourAns}</strong> &nbsp;|&nbsp; Correct: <strong>${correctAns}</strong>${expLine}
        </div>`;
    }

    const verifLabel = isVerified
        ? (correctness[idx] ? '<span style="color:#4ade80;">✅ Correct</span>' : '<span style="color:#f87171;">❌ Incorrect</span>')
        : '<span style="color:#64748b;">⏳ Not verified</span>';

    const hintText = isVerified
        ? "✔ Verified — navigate freely or reset to retry."
        : "Select answer(s) then click <strong>Submit &amp; Verify</strong>.";

    area.innerHTML = `
        <!-- Progress -->
        <div class="card" style="padding:18px 22px;">
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;">${pct}%</div></div>
            <div class="progress-meta">
                <span>Question ${idx + 1} / ${activeQ.length}</span>
                <span>${verifLabel}</span>
            </div>
        </div>

        <!-- Question -->
        <div class="question-card">
            <div class="question-meta">
                <span class="q-tag">Q${q.num}</span>
                <span class="q-tag">${esc(q._setLabel)}</span>
                ${q.answers.length > 1 ? `<span class="q-tag" style="color:#fbbf24;">Choose ${q.answers.length}</span>` : ""}
            </div>
            <div class="question-text">${esc(q.text)}</div>
            <div class="options-list">${optHtml}</div>
            ${feedbackHtml}
            <div class="hint-line">${hintText}</div>
        </div>

        <!-- Nav -->
        <div class="nav-row">
            <button class="btn btn-gray" onclick="go(-1)" ${idx === 0 ? "disabled" : ""}>◀ Prev</button>
            <button class="btn btn-blue" onclick="verify()" ${isVerified ? "disabled" : ""}>✅ Submit &amp; Verify</button>
            <button class="btn btn-green" onclick="go(1)" ${idx === activeQ.length - 1 ? "disabled" : ""}>Next ▶</button>
            <button class="btn btn-amber" onclick="doReset()">⟳ Reset</button>
            <button class="btn btn-purple" onclick="showResults()">🏆 Results</button>
        </div>
    `;
    updateStats();
}

function showEmpty() {
    document.getElementById("quizArea").innerHTML = `
        <div class="empty-state"><div class="icon">📂</div>No questions loaded.</div>`;
}
function showLoading() {
    document.getElementById("quizArea").innerHTML = `
        <div class="card"><div class="loading"><div class="spinner"></div> Loading question sets…</div></div>`;
}

// ═══════════════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════════════
function toggleOpt(letter) {
    if (verified[idx]) return;
    let sel = selections[idx] ? [...selections[idx]] : [];
    if (sel.includes(letter)) sel = sel.filter(l => l !== letter);
    else sel.push(letter);
    selections[idx] = sel;
    renderQuiz();
}

function verify() {
    if (verified[idx]) return;
    const mySelect = selections[idx] || [];
    if (!mySelect.length) { alert("Select at least one option."); return; }
    const q = activeQ[idx];
    const ok = JSON.stringify([...mySelect].sort()) === JSON.stringify([...q.answers].sort());
    verified[idx]    = true;
    correctness[idx] = ok;
    updateStats();
    renderQuiz();
}

function go(dir) {
    const next = idx + dir;
    if (next >= 0 && next < activeQ.length) { idx = next; renderQuiz(); }
}

function doReset() {
    if (!confirm("Reset all progress? This clears all answers and verifications.")) return;
    idx = 0; selections = {}; verified = {}; correctness = {};
    updateStats();
    renderQuiz();
}

// ═══════════════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════════════
function updateStats() {
    document.getElementById("totalQty").textContent    = activeQ.length;
    document.getElementById("answeredQty").textContent = Object.keys(verified).length;
    document.getElementById("correctQty").textContent  = Object.values(correctness).filter(Boolean).length;
    document.getElementById("setNames").textContent    = loadedSets.map(s => s.label).join(" · ");
}

// ═══════════════════════════════════════════════════════
//  RESULTS MODAL
// ═══════════════════════════════════════════════════════
function showResults() {
    if (!activeQ.length) { alert("No questions loaded."); return; }
    const total   = activeQ.length;
    const correct = Object.values(correctness).filter(Boolean).length;
    const pct     = ((correct / total) * 100).toFixed(1);
    const grade   = pct >= 70 ? "🎉 Pass" : "📚 Keep Practicing";

    let rows = activeQ.map((q, i) => {
        const st = verified[i]
            ? (correctness[i] ? '<span style="color:#4ade80;">✓ Correct</span>' : '<span style="color:#f87171;">✗ Wrong</span>')
            : '<span style="color:#64748b;">— Skipped</span>';
        const your = (selections[i] || []).join(", ") || "—";
        return `<div class="result-item">
            <div class="ri-top"><span><strong>Q${q.num}</strong> – ${esc(q.text.slice(0, 75))}${q.text.length > 75 ? "…" : ""}</span>${st}</div>
            <div class="ri-ans">Your: ${your} &nbsp;|&nbsp; Correct: ${q.answers.join(", ")}</div>
            ${q.explanation ? `<div class="ri-ans" style="color:#6b7280;margin-top:4px;">💡 ${esc(q.explanation)}</div>` : ""}
        </div>`;
    }).join("");

    document.getElementById("modalBody").innerHTML = `
        <div class="score-summary">
            <div><div class="score-big" style="color:${pct>=70?'#4ade80':'#f87171'}">${pct}%</div><div class="score-label">${grade}</div></div>
            <div><div class="score-big">${correct}/${total}</div><div class="score-label">Correct / Total</div></div>
            <div><div class="score-big">${Object.keys(verified).length}</div><div class="score-label">Verified</div></div>
        </div>
        <div style="max-height:350px; overflow-y:auto;">${rows}</div>`;
    document.getElementById("resultsModal").classList.add("open");
}

document.getElementById("closeModal").addEventListener("click", () => {
    document.getElementById("resultsModal").classList.remove("open");
});
document.getElementById("resetFromModal").addEventListener("click", () => {
    document.getElementById("resultsModal").classList.remove("open");
    doReset();
});
document.getElementById("resultsModal").addEventListener("click", function(e) {
    if (e.target === this) this.classList.remove("open");
});

// ── Expose helpers to inline onclick ──
window.toggleOpt = toggleOpt;
window.verify    = verify;
window.go        = go;
window.doReset   = doReset;
window.showResults = showResults;

// ── Tiny HTML escaper ──
function esc(str) {
    if (!str) return "";
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
</script>
