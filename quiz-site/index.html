<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PD2 Exam Quiz - Salesforce Platform Developer II</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            padding: 24px 16px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header Styles */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            animation: slideDown 0.5s ease;
        }
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* Loading State */
        .loading-container {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            margin-top: 50px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Quiz Section */
        .quiz-section {
            animation: fadeIn 0.5s ease;
        }

        .progress-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: 600;
            color: #333;
        }

        .progress-bar-wrapper {
            width: 100%;
        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            height: 30px;
            position: relative;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        /* Question Card */
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .question-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .question-counter {
            color: #999;
            font-size: 0.9em;
        }

        .question-text {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #333;
            font-weight: 500;
        }

        /* Options Container */
        .options-container {
            margin-bottom: 20px;
        }

        .option-item {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .option-item:hover:not(.disabled) {
            background: #f0f0f0;
            border-color: #667eea;
            transform: translateX(5px);
        }

        .option-item.selected {
            background: #e8eaff;
            border-color: #667eea;
        }

        .option-item.correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .option-item.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .option-item.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-letter {
            font-weight: bold;
            font-size: 1.1em;
            min-width: 35px;
            color: #667eea;
        }

        .option-text {
            flex: 1;
            line-height: 1.5;
            color: #333;
        }

        /* Feedback Section */
        .feedback-section {
            margin-top: 20px;
            animation: slideUp 0.3s ease;
        }

        .feedback-message {
            padding: 15px;
            border-radius: 10px;
            font-weight: 500;
        }

        .feedback-message.correct {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .feedback-message.incorrect {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 12px 24px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .prev-btn {
            background: #6c757d;
            color: white;
        }

        .next-btn {
            background: #667eea;
            color: white;
        }

        .check-btn {
            background: #28a745;
            color: white;
        }

        .reset-btn {
            background: #dc3545;
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            border-radius: 20px;
            width: 90%;
            max-width: 800px;
            max-height: 85%;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            padding: 20px 25px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            border-radius: 20px 20px 0 0;
        }

        .modal-header h2 {
            color: #333;
        }

        .close-btn {
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
            line-height: 1;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-body {
            padding: 25px;
        }

        .modal-footer {
            padding: 20px 25px;
            border-top: 2px solid #f0f0f0;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            position: sticky;
            bottom: 0;
            background: white;
            border-radius: 0 0 20px 20px;
        }

        /* Results Styles */
        .results-summary {
            text-align: center;
            margin-bottom: 30px;
        }

        .score-circle {
            display: inline-block;
            padding: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            color: white;
            margin-bottom: 20px;
        }

        .score-number {
            font-size: 2em;
            font-weight: bold;
        }

        .score-percentage {
            font-size: 1.2em;
            margin-top: 5px;
        }

        .score-grade {
            font-size: 1.1em;
            margin-top: 5px;
        }

        .results-message {
            font-size: 1.1em;
            color: #666;
        }

        .results-details {
            margin-top: 30px;
        }

        .results-details h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .result-item {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid;
        }

        .result-correct {
            background: #d4edda;
            border-left-color: #28a745;
        }

        .result-incorrect {
            background: #f8d7da;
            border-left-color: #dc3545;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .result-status {
            font-size: 1.2em;
            font-weight: bold;
        }

        .result-number {
            font-weight: bold;
            color: #333;
        }

        .result-text {
            margin-bottom: 8px;
            color: #666;
        }

        .result-answers {
            font-size: 0.9em;
            color: #666;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        /* Error Message */
        .error-message {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            margin-top: 50px;
        }

        .error-message h3 {
            color: #dc3545;
            margin-bottom: 15px;
        }

        .error-message p {
            color: #666;
            margin-bottom: 20px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 1.5em;
            }
            
            .header p {
                font-size: 0.9em;
            }
            
            .question-card {
                padding: 20px;
            }
            
            .question-text {
                font-size: 1em;
            }
            
            .nav-btn {
                padding: 10px 18px;
                font-size: 0.9em;
            }
            
            .option-text {
                font-size: 0.9em;
            }
            
            .modal-content {
                margin: 10% auto;
                width: 95%;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📚 Salesforce Platform Developer II (PD2)</h1>
            <p>Exam Preparation Quiz</p>
        </div>

        <!-- Loading State -->
        <div id="loadingContainer" class="loading-container">
            <div class="spinner"></div>
            <p>Loading questions from JSON file...</p>
        </div>

        <!-- Quiz Section (hidden initially) -->
        <div id="quizSection" class="quiz-section" style="display: none;">
            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-info">
                    <span id="progressText">📊 Progress: 0/0</span>
                    <span id="scoreText">⭐ Score: 0/0</span>
                </div>
                <div class="progress-bar-wrapper">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>

            <!-- Question Card -->
            <div class="question-card">
                <div class="question-header">
                    <span class="question-badge" id="questionBadge">Question</span>
                    <span class="question-counter" id="questionCounter">1 / 0</span>
                </div>
                <div class="question-text" id="questionText"></div>
                <div class="options-container" id="optionsContainer"></div>
                <div class="feedback-section" id="feedbackSection" style="display: none;">
                    <div class="feedback-message" id="feedbackMessage"></div>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="nav-buttons">
                <button class="nav-btn prev-btn" id="prevBtn">
                    <span>←</span> Previous
                </button>
                <button class="nav-btn check-btn" id="checkBtn">
                    <span>✓</span> Check Answer
                </button>
                <button class="nav-btn next-btn" id="nextBtn">
                    Next <span>→</span>
                </button>
                <button class="nav-btn reset-btn" id="resetBtn">
                    <span>⟳</span> Reset
                </button>
            </div>
        </div>
    </div>

    <!-- Results Modal -->
    <div class="modal" id="resultsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🏆 Quiz Results</h2>
                <span class="close-btn" id="closeModalBtn">&times;</span>
            </div>
            <div class="modal-body" id="resultsBody"></div>
            <div class="modal-footer">
                <button class="btn-secondary" id="closeResultsBtn">Close</button>
                <button class="btn-primary" id="retakeQuizBtn">🔄 Take Quiz Again</button>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let questions = [];
        let currentQuestionIndex = 0;
        let userAnswers = {};
        let showingResult = false;
        let currentSelectedOptions = new Set();

        // DOM Elements
        const loadingContainer = document.getElementById('loadingContainer');
        const quizSection = document.getElementById('quizSection');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const checkBtn = document.getElementById('checkBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultsModal = document.getElementById('resultsModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const closeResultsBtn = document.getElementById('closeResultsBtn');
        const retakeQuizBtn = document.getElementById('retakeQuizBtn');

        // Load questions from JSON file
        async function loadQuestions() {
            try {
                // Try to load from questions.json
                const response = await fetch('questions.json');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                questions = await response.json();
                
                if (!questions || questions.length === 0) {
                    throw new Error('No questions found in JSON file');
                }
                
                console.log(`✅ Successfully loaded ${questions.length} questions`);
                initializeQuiz();
                
            } catch (error) {
                console.error('Error loading questions:', error);
                showError(`
                    <h3>⚠️ Error Loading Questions</h3>
                    <p>Could not load questions.json file. Make sure the file exists in the same directory as this HTML file.</p>
                    <p><strong>Expected format:</strong> questions.json in the same folder</p>
                    <p><strong>Error details:</strong> ${error.message}</p>
                    <button onclick="location.reload()" class="btn-primary" style="margin-top: 20px;">Retry</button>
                `);
            }
        }

        function showError(message) {
            loadingContainer.innerHTML = `
                <div class="error-message">
                    ${message}
                </div>
            `;
        }

        function initializeQuiz() {
            // Hide loading, show quiz
            loadingContainer.style.display = 'none';
            quizSection.style.display = 'block';
            
            // Initialize quiz state
            currentQuestionIndex = 0;
            userAnswers = {};
            showingResult = false;
            
            // Display first question
            displayQuestion();
            updateProgress();
            updateScore();
        }

        function displayQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showResults();
                return;
            }
            
            const question = questions[currentQuestionIndex];
            
            // Update header
            document.getElementById('questionBadge').textContent = `Question ${question.q_num || currentQuestionIndex + 1}`;
            document.getElementById('questionCounter').textContent = `${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('questionText').textContent = question.text;
            
            // Clear and rebuild options
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            currentSelectedOptions.clear();
            
            // Load saved answers if any
            const savedAnswers = userAnswers[currentQuestionIndex] || [];
            
            // Create option elements
            for (const [letter, text] of Object.entries(question.options)) {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option-item';
                if (savedAnswers.includes(letter)) {
                    optionDiv.classList.add('selected');
                    currentSelectedOptions.add(letter);
                }
                if (showingResult) {
                    optionDiv.classList.add('disabled');
                    if (question.answers.includes(letter)) {
                        optionDiv.classList.add('correct');
                    } else if (savedAnswers.includes(letter) && !question.answers.includes(letter)) {
                        optionDiv.classList.add('incorrect');
                    }
                }
                
                optionDiv.innerHTML = `
                    <div class="option-letter">${letter}.</div>
                    <div class="option-text">${escapeHtml(text)}</div>
                `;
                
                if (!showingResult) {
                    optionDiv.onclick = () => toggleOption(letter);
                }
                
                optionsContainer.appendChild(optionDiv);
            }
            
            // Hide feedback if not showing results
            if (!showingResult) {
                document.getElementById('feedbackSection').style.display = 'none';
            }
            
            // Update button states
            updateButtonStates();
        }

        function toggleOption(letter) {
            if (showingResult) return;
            
            const optionDivs = document.querySelectorAll('.option-item');
            
            if (currentSelectedOptions.has(letter)) {
                currentSelectedOptions.delete(letter);
                optionDivs[getOptionIndex(letter)].classList.remove('selected');
            } else {
                currentSelectedOptions.add(letter);
                optionDivs[getOptionIndex(letter)].classList.add('selected');
            }
        }

        function getOptionIndex(letter) {
            const letters = ['A', 'B', 'C', 'D', 'E'];
            return letters.indexOf(letter);
        }

        function checkAnswer() {
            if (showingResult) {
                showNotification('Answer already checked! Move to next question.', 'info');
                return;
            }
            
            const selected = Array.from(currentSelectedOptions);
            if (selected.length === 0) {
                showNotification('Please select an answer before checking!', 'warning');
                return;
            }
            
            const question = questions[currentQuestionIndex];
            const isCorrect = arraysEqual(selected.sort(), question.answers.sort());
            
            // Save answer
            userAnswers[currentQuestionIndex] = selected;
            showingResult = true;
            
            // Show feedback
            const feedbackSection = document.getElementById('feedbackSection');
            const feedbackMessage = document.getElementById('feedbackMessage');
            
            if (isCorrect) {
                feedbackMessage.className = 'feedback-message correct';
                feedbackMessage.innerHTML = `✅ Correct! ${getCorrectAnswerMessage(question)}`;
            } else {
                feedbackMessage.className = 'feedback-message incorrect';
                feedbackMessage.innerHTML = `❌ Incorrect! The correct answer${question.answers.length > 1 ? 's are' : ' is'}: ${question.answers.join(', ')}`;
            }
            
            feedbackSection.style.display = 'block';
            
            // Re-render question with correct/incorrect highlighting
            displayQuestion();
            updateProgress();
            updateScore();
            
            // Disable check button after checking
            checkBtn.disabled = true;
        }

        function getCorrectAnswerMessage(question) {
            if (question.answers.length === 1) {
                return `The correct answer is ${question.answers[0]}.`;
            } else {
                return `The correct answers are ${question.answers.join(', ')}.`;
            }
        }

        function nextQuestion() {
            if (!showingResult && currentQuestionIndex in userAnswers) {
                showingResult = true;
                displayQuestion();
            }
            
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                showingResult = false;
                checkBtn.disabled = false;
                displayQuestion();
                updateProgress();
            } else if (currentQuestionIndex === questions.length - 1 && showingResult) {
                showResults();
            } else if (!showingResult) {
                showNotification('Please check your answer before moving to the next question!', 'warning');
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showingResult = false;
                checkBtn.disabled = false;
                displayQuestion();
                updateProgress();
            }
        }

        function updateProgress() {
            const answered = Object.keys(userAnswers).length;
            const progress = (answered / questions.length) * 100;
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = `${progress}%`;
            progressFill.textContent = `${Math.round(progress)}%`;
            
            document.getElementById('progressText').textContent = `📊 Progress: ${answered}/${questions.length}`;
        }

        function updateScore() {
            let correctCount = 0;
            for (let i = 0; i < questions.length; i++) {
                const userAnswer = userAnswers[i];
                if (userAnswer && arraysEqual(userAnswer.sort(), questions[i].answers.sort())) {
                    correctCount++;
                }
            }
            document.getElementById('scoreText').textContent = `⭐ Score: ${correctCount}/${questions.length}`;
        }

        function updateButtonStates() {
            prevBtn.disabled = currentQuestionIndex === 0;
        }

        function resetQuiz() {
            if (confirm('Are you sure you want to reset the quiz? All progress will be lost.')) {
                currentQuestionIndex = 0;
                userAnswers = {};
                showingResult = false;
                checkBtn.disabled = false;
                displayQuestion();
                updateProgress();
                updateScore();
                showNotification('Quiz has been reset!', 'success');
            }
        }

        function showResults() {
            let correctCount = 0;
            const results = [];
            
            for (let i = 0; i < questions.length; i++) {
                const userAnswer = userAnswers[i];
                const isCorrect = userAnswer && arraysEqual(userAnswer.sort(), questions[i].answers.sort());
                if (isCorrect) correctCount++;
                
                results.push({
                    number: questions[i].q_num || i + 1,
                    text: questions[i].text,
                    userAnswer: userAnswer || ['Not answered'],
                    correctAnswer: questions[i].answers,
                    isCorrect: isCorrect
                });
            }
            
            const percentage = (correctCount / questions.length) * 100;
            let grade = '';
            let message = '';
            
            if (percentage >= 90) {
                grade = 'A+ 🎉';
                message = 'Excellent! You\'re well prepared for the exam!';
            } else if (percentage >= 80) {
                grade = 'A 📚';
                message = 'Good job! A bit more practice and you\'ll ace it!';
            } else if (percentage >= 70) {
                grade = 'B 👍';
                message = 'Nice work! Review the questions you missed.';
            } else if (percentage >= 60) {
                grade = 'C 📖';
                message = 'Good effort! Study the topics you got wrong.';
            } else {
                grade = 'Need Improvement 💪';
                message = 'Keep practicing! Review all questions and try again.';
            }
            
            const resultsHTML = `
                <div class="results-summary">
                    <div class="score-circle">
                        <div class="score-number">${correctCount}/${questions.length}</div>
                        <div class="score-percentage">${percentage.toFixed(1)}%</div>
                        <div class="score-grade">${grade}</div>
                    </div>
                    <p class="results-message">${message}</p>
                </div>
                <div class="results-details">
                    <h3>Detailed Results:</h3>
                    ${results.map(r => `
                        <div class="result-item ${r.isCorrect ? 'result-correct' : 'result-incorrect'}">
                            <div class="result-header">
                                <span class="result-status">${r.isCorrect ? '✓' : '✗'}</span>
                                <span class="result-number">Question ${r.number}</span>
                            </div>
                            <div class="result-text">${escapeHtml(r.text.substring(0, 100))}${r.text.length > 100 ? '...' : ''}</div>
                            <div class="result-answers">
                                <div><strong>Your answer:</strong> ${r.userAnswer.join(', ')}</div>
                                <div><strong>Correct answer:</strong> ${r.correctAnswer.join(', ')}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            document.getElementById('resultsBody').innerHTML = resultsHTML;
            resultsModal.style.display = 'block';
        }

        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            for (let i = 0; i < a.length; i++) {
                if (a[i] !== b[i]) return false;
            }
            return true;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showNotification(message, type) {
            // Create temporary notification
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                background: ${type === 'success' ? '#28a745' : type === 'error' ? '#dc3545' : type === 'warning' ? '#ffc107' : '#17a2b8'};
                color: ${type === 'warning' ? '#333' : 'white'};
                border-radius: 10px;
                z-index: 10000;
                animation: slideIn 0.3s ease;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                font-weight: 500;
            `;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'fadeOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Event listeners
        prevBtn.addEventListener('click', prevQuestion);
        nextBtn.addEventListener('click', nextQuestion);
        checkBtn.addEventListener('click', checkAnswer);
        resetBtn.addEventListener('click', resetQuiz);
        
        closeModalBtn.addEventListener('click', () => {
            resultsModal.style.display = 'none';
        });
        
        closeResultsBtn.addEventListener('click', () => {
            resultsModal.style.display = 'none';
        });
        
        retakeQuizBtn.addEventListener('click', () => {
            resultsModal.style.display = 'none';
            resetQuiz();
        });
        
        // Close modal when clicking outside
        window.addEventListener('click', (e) => {
            if (e.target === resultsModal) {
                resultsModal.style.display = 'none';
            }
        });

        // Load questions on page load
        loadQuestions();
    </script>
</body>
</html>
